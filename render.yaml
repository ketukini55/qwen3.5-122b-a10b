services:
  - type: web
    name: qwen-chatbot-backend
    env: node
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: QWEN_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
