name: Validate and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-backend:
    name: Validate Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Validate backend package.json
        run: node -e "JSON.parse(require('fs').readFileSync('backend/package.json','utf8')); console.log('backend/package.json is valid JSON');"

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Verify backend server syntax
        working-directory: backend
        run: node --check server.js

  validate-frontend:
    name: Validate Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Validate frontend package.json
        run: node -e "JSON.parse(require('fs').readFileSync('frontend/package.json','utf8')); console.log('frontend/package.json is valid JSON');"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
